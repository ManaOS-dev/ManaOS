name: CI

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main", "dev" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-uefi

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install audit tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny,cargo-license,cargo-machete,typos-cli

      - name: Check Formatting
        run: just fmt

      - name: Run Clippy
        run: just lint

      - name: Check Workspace
        run: cargo check --workspace --all-targets --all-features

      - name: Run Tests
        run: cargo test --workspace --all-features

      - name: Build Kernel
        run: cargo build --target x86_64-unknown-uefi

      - name: Audit Dependencies
        run: cargo audit

      - name: Check Dependency Policy
        run: cargo deny check

      - name: Check Unused Dependencies
        run: cargo machete

      - name: Check Typos
        run: typos

      - name: Regenerate Third-Party Licenses
        run: pwsh -File scripts/generate_third_party_licenses.ps1

      - name: Check Third-Party License Inventory
        run: git diff --exit-code THIRD_PARTY_LICENSES.md

      - name: Upload EFI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mana_os_efi
          path: target/x86_64-unknown-uefi/debug/mana_os.efi
